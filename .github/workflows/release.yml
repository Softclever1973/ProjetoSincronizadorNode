name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest 

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar dependências (produção)
        run: npm install --production

      - name: Build server.exe
        run: npm run build:server

      - name: Build client.exe
        run: npm run build:client

      - name: Compactar client
        run: |
          Compress-Archive -Path "src/client", "node_modules", "package.json", "src/client/.env.example" -DestinationPath "client.zip"

      - name: Compactar server
        run: |
          Compress-Archive -Path "src", "node_modules", "package.json", ".env.example" -DestinationPath "server.zip" -Update

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server.exe
            dist/client.exe
            client.zip
            server.zip