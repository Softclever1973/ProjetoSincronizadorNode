name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
jobs:
  build:
    # Linux: cross-compila para Windows (node18-win-x64) sem precisar de
    # runner Windows. Mais rápido, mais barato (0.5× vs 2× minutos do Windows)
    # e sem risco de o runner atualizar o Node.js para versão sem binário no pkg.
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências (produção)
        run: npm install --production

      - name: Build server.exe
        run: npm run build:server

      - name: Build client.exe
        run: npm run build:client

      - name: Compactar client
        run: zip -r client.zip src/client node_modules package.json src/client/.env.example

      - name: Compactar server
        run: zip -r server.zip src node_modules package.json .env.example

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server.exe
            dist/client.exe
            client.zip
            server.zip