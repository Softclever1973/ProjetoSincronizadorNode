name: Build, Test & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Build server.exe
        run: npm run build:server

      - name: Build client.exe
        run: npm run build:client

      - name: Zipar client
        run: 7z a client.zip src\client node_modules package.json src\client\.env.example

      - name: Zipar server (sem client)
        run: 7z a server.zip src node_modules package.json .env.example "-xr!client"

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/server.exe
            dist/client.exe
            client.zip
            server.zip

  smoke-test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Baixar artefatos do build
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Smoke test — server.exe
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\server.exe" `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput "server_stdout.txt" `
            -RedirectStandardError  "server_stderr.txt"
          Start-Sleep -Seconds 3
          if (-not $proc.HasExited) { $proc.Kill() }
          $out = (Get-Content "server_stdout.txt" -Raw -ErrorAction SilentlyContinue) +
                 (Get-Content "server_stderr.txt" -Raw -ErrorAction SilentlyContinue)
          if (-not $out.Trim()) {
            Write-Error "server.exe não produziu nenhuma saída — crash no binário"
            exit 1
          }
          Write-Host "server.exe OK"
          Write-Host $out.Substring(0, [Math]::Min(300, $out.Length))

      - name: Smoke test — client.exe
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\client.exe" `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput "client_stdout.txt" `
            -RedirectStandardError  "client_stderr.txt"
          Start-Sleep -Seconds 3
          if (-not $proc.HasExited) { $proc.Kill() }
          $out = (Get-Content "client_stdout.txt" -Raw -ErrorAction SilentlyContinue) +
                 (Get-Content "client_stderr.txt" -Raw -ErrorAction SilentlyContinue)
          if (-not $out.Trim()) {
            Write-Error "client.exe não produziu nenhuma saída — crash no binário"
            exit 1
          }
          Write-Host "client.exe OK"
          Write-Host $out.Substring(0, [Math]::Min(300, $out.Length))

  release:
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar artefatos aprovados
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Criar release e anexar arquivos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/server.exe
            dist/client.exe
            client.zip
            server.zip
