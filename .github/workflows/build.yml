name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Build server.exe
        run: npm run build:server

      - name: Build client.exe
        run: npm run build:client

      - name: Zipar client
        run: |
          zip -r client.zip \
            src/client \
            node_modules \
            package.json \
            src/client/.env.example

      - name: Zipar server (sem client)
        run: |
          zip -r server.zip \
            src \
            node_modules \
            package.json \
            .env.example \
            -x "src/client/*"

      - name: Salvar nome da tag
        run: echo "${{ github.ref_name }}" > version.txt

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/server.exe
            dist/client.exe
            client.zip
            server.zip
            version.txt
